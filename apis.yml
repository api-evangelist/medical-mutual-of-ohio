name: Medical Mutual of Ohio
description: >-
  Medical Mutual of Ohio is the oldest and one of the largest health insurance
  companies based in Ohio, providing health insurance plans to individuals,
  families, and employer groups. No public developer portal or API
  specifications are currently documented; CMS-mandated Patient Access and
  Provider Directory FHIR endpoints, where they exist, are typically reached
  via member or provider account workflows rather than an open developer site.
